name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Wails v3
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install music service dependencies
        run: |
          cd lx-music-service
          npm install --production
          npm prune --production

      - name: Build macOS
        run: |
          task darwin:package

      - name: Package with music service
        run: |
          # 将 lx-music-service 复制到 .app 内部
          mkdir -p bin/LTools.app/Contents/Resources
          cp -r lx-music-service bin/LTools.app/Contents/Resources/

          # 打包整个应用
          tar czf ltools-${{ github.ref_name }}-darwin-arm64.tar.gz -C bin LTools.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: ltools-${{ github.ref_name }}-darwin-arm64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Task
        run: |
          $installPath = "$env:USERPROFILE\.local\bin"
          New-Item -ItemType Directory -Force -Path $installPath
          Invoke-WebRequest -Uri "https://github.com/go-task/task/releases/latest/download/task_windows_amd64.zip" -OutFile "task.zip"
          Expand-Archive -Path "task.zip" -DestinationPath $installPath
          echo "$installPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails v3
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          $goPath = go env GOPATH
          $binPath = Join-Path $goPath "bin"
          echo "$binPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install music service dependencies
        run: |
          cd lx-music-service
          npm install --production
          npm prune --production

      - name: Build Windows
        run: |
          task windows:build

      - name: Package with music service
        run: |
          # 创建发布目录结构
          mkdir release
          cp bin\ltools.exe release\

          # 复制音乐服务
          Copy-Item -Path "lx-music-service" -Destination "release\lx-music-service" -Recurse

          # 打包
          Compress-Archive -Path release\* -DestinationPath ltools-${{ github.ref_name }}-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: ltools-${{ github.ref_name }}-windows-amd64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Wails v3
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install music service dependencies
        run: |
          cd lx-music-service
          npm install --production
          npm prune --production

      - name: Build Linux
        run: |
          task linux:build

      - name: Package with music service
        run: |
          # 创建发布目录结构
          mkdir -p release
          cp bin/ltools release/

          # 复制音乐服务
          cp -r lx-music-service release/

          # 打包
          tar czf ltools-${{ github.ref_name }}-linux-amd64.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: ltools-${{ github.ref_name }}-linux-amd64.tar.gz

  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name "*.tar.gz" -exec cp {} release/ \;
          find artifacts -type f -name "*.zip" -exec cp {} release/ \;
          ls -lh release/

      - name: Generate update manifest
        run: |
          chmod +x ./scripts/generate-update-manifest.sh
          ./scripts/generate-update-manifest.sh \
            ${{ github.ref_name }} \
            ./release \
            https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body: |
            ## 🎉 LTools ${{ github.ref_name }} 发布

            ### 系统要求

            **⚠️ 重要：音乐播放器功能需要 Node.js >= 16.0.0**

            - 下载地址：https://nodejs.org/
            - 推荐版本：LTS (Long Term Support)

            ### 下载地址

            | 平台 | 文件 | 大小 |
            |------|------|------|
            | macOS (ARM64) | `ltools-${{ github.ref_name }}-darwin-arm64.tar.gz` | ~50 MB |
            | Windows (x64) | `ltools-${{ github.ref_name }}-windows-amd64.zip` | ~55 MB |
            | Linux (x64) | `ltools-${{ github.ref_name }}-linux-amd64.tar.gz` | ~52 MB |

            ### 新功能

            - ✨ 自动更新机制（启动 10 秒后自动检查）
            - 🎵 音乐播放器（已包含音源服务）
            - 📋 剪贴板管理
            - 🔍 全局搜索

            ### 自动更新

            此版本已配置自动更新：
            - 应用启动 10 秒后自动检查更新
            - 发现新版本时显示友好通知
            - 支持手动检查（点击右下角刷新按钮）

            更新清单：[update.json](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/update.json)

            ### 安装说明

            #### macOS
            ```bash
            # 1. 确保已安装 Node.js >= 16.0.0
            node --version

            # 2. 解压并安装应用
            tar xzf ltools-${{ github.ref_name }}-darwin-arm64.tar.gz
            mv LTools.app /Applications/

            # 3. 启动应用
            open /Applications/LTools.app
            ```

            #### Windows
            ```powershell
            # 1. 确保已安装 Node.js >= 16.0.0
            node --version

            # 2. 解压
            Expand-Archive ltools-${{ github.ref_name }}-windows-amd64.zip -DestinationPath C:\LTools

            # 3. 运行
            cd C:\LTools
            .\ltools.exe
            ```

            #### Linux
            ```bash
            # 1. 确保已安装 Node.js >= 16.0.0
            node --version

            # 2. 解压
            tar xzf ltools-${{ github.ref_name }}-linux-amd64.tar.gz

            # 3. 安装（可选）
            chmod +x ltools
            sudo mv ltools lx-music-service /usr/local/bin/

            # 4. 运行
            ./ltools
            ```

            ### 包含的组件

            - **LTools 主程序**
            - **音乐播放器音源服务**（已内置）
              - Node.js 依赖已预装
              - 支持多音源
              - 自动代理

            ### 故障排查

            **音乐播放器无法使用？**
            ```bash
            # 检查 Node.js 版本
            node --version  # 应该 >= v16.0.0

            # 检查服务文件
            ls -la lx-music-service/
            ```

            **应用无法启动？**
            - macOS: `chmod +x /Applications/LTools.app/Contents/MacOS/LTools`
            - Linux: `chmod +x ltools`
            - Windows: 检查防病毒软件

            ---

            **完整更新日志**: 查看 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest manifest
        run: |
          # 将 update.json 复制到仓库根目录，作为 latest 版本
          cp release/update.json update.json

          # 配置 git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 提交并推送到 main 分支
          git add update.json
          git commit -m "chore: update manifest for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
