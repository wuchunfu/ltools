name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            arch: amd64
            ext: ''
            archive: tar.gz
          - os: macos-latest
            goos: darwin
            arch: arm64
            ext: '.app'
            archive: tar.gz
          - os: macos-12
            goos: darwin
            arch: amd64
            ext: '.app'
            archive: tar.gz
          - os: windows-latest
            goos: windows
            arch: amd64
            ext: '.exe'
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache MinGW-w64 and NSIS (Windows)
        if: matrix.goos == 'windows'
        id: cache-windows-deps
        uses: actions/cache@v4
        with:
          path: |
            C:\ProgramData\chocolatey\lib\mingw
            C:\Program Files (x86)\NSIS
            C:\ProgramData\chocolatey\bin\gcc.exe
            C:\ProgramData\chocolatey\bin\g++.exe
            C:\ProgramData\chocolatey\bin\make.exe
          key: ${{ runner.os }}-mingw-nsis-v3
          restore-keys: |
            ${{ runner.os }}-mingw-nsis-

      - name: Install Windows dependencies
        if: matrix.goos == 'windows' && steps.cache-windows-deps.outputs.cache-hit != 'true'
        run: |
          choco install mingw nsis -y
          echo "MinGW-w64 and NSIS installed successfully"
          # Create symbolic link for makensis in Chocolatey bin directory
          New-Item -ItemType SymbolicLink -Path "C:\ProgramData\chocolatey\bin\makensis.exe" -Target "C:\Program Files (x86)\NSIS\makensis.exe" -Force
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
          echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          gcc --version
          makensis --version
        shell: powershell

      - name: Verify Windows dependencies from cache
        if: matrix.goos == 'windows' && steps.cache-windows-deps.outputs.cache-hit == 'true'
        run: |
          echo "Using MinGW-w64 and NSIS from cache"
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
          echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          gcc --version
          makensis --version
        shell: powershell

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'lx-music-service/package-lock.json'

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxcb1-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config \
            build-essential

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails3
          key: ${{ runner.os }}-wails3-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-wails3-

      - name: Install Wails CLI
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Add Wails to PATH (from cache)
        if: steps.cache-wails.outputs.cache-hit == 'true'
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install Task
        run: |
          curl -sL https://taskfile.dev/install.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Install music service dependencies
        run: |
          cd lx-music-service
          npm install --production
          npm prune --production

      - name: Clean Go build cache
        run: go clean -cache

      - name: Build and package application
        run: wails3 package

      - name: Prepare release (macOS)
        if: matrix.goos == 'darwin'
        run: |
          # macOS: .app bundle (tar.gz)
          ARCH="${{ matrix.arch }}"
          if [ -z "$ARCH" ]; then
            ARCH="$(uname -m)"
          fi
          tar czf ltools-${{ github.ref_name }}-${{ matrix.goos }}-${ARCH}.tar.gz -C bin LTools.app

      - name: Prepare release (Windows)
        if: matrix.goos == 'windows'
        run: |
          # Windows: NSIS 安装程序（用于更新和首次安装）
          Move-Item -Path "bin\ltools-amd64-installer.exe" -Destination "ltools-${{ github.ref_name }}-${{ matrix.goos }}-amd64-installer.exe"

      - name: Prepare release (Linux)
        if: matrix.goos == 'linux'
        run: |
          # 确定架构
          ARCH="${{ matrix.arch }}"
          if [ -z "$ARCH" ]; then
            ARCH="amd64"
          fi

          # Linux: AppImage (用于更新和首次安装)
          if [ -f bin/ltools-${ARCH}.AppImage ]; then
            cp bin/ltools-${ARCH}.AppImage ltools-${{ github.ref_name }}-${{ matrix.goos }}-${ARCH}.AppImage
          fi
          # DEB/RPM (可选，供手动下载)
          if [ -f bin/ltools_*_${ARCH}.deb ]; then
            cp bin/ltools_*_${ARCH}.deb ltools-${{ github.ref_name }}-${{ matrix.goos }}-${ARCH}.deb
          fi
          if [ -f bin/ltools-*.x86_64.rpm ]; then
            cp bin/ltools-*.x86_64.rpm ltools-${{ github.ref_name }}-${{ matrix.goos }}-${ARCH}.rpm
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.goos }}
          path: |
            *.tar.gz
            *.zip
            *.exe
            *.AppImage
            *.deb
            *.rpm

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "update.json" \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate update manifest
        run: |
          chmod +x ./scripts/generate-update-manifest.sh
          ./scripts/generate-update-manifest.sh \
            ${{ github.ref_name }} \
            ./release \
            https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body: |
            ## 🎉 LTools ${{ github.ref_name }} 发布

            ### 系统要求

            **⚠️ 重要：音乐播放器功能需要 Node.js >= 16.0.0**

            - 下载地址：https://nodejs.org/
            - 推荐版本：LTS (Long Term Support)

            ### 下载地址

            | 平台 | 文件 | 大小 | 说明 |
            |------|------|------|------|
            | macOS (ARM64) | `ltools-${{ github.ref_name }}-darwin-arm64.tar.gz` | ~50 MB | .app bundle (Apple Silicon) |
            | macOS (AMD64) | `ltools-${{ github.ref_name }}-darwin-amd64.tar.gz` | ~50 MB | .app bundle (Intel Mac) |
            | Windows (x64) | `ltools-${{ github.ref_name }}-windows-amd64-installer.exe` | ~55 MB | NSIS 安装程序 |
            | Linux (x64) | `ltools-${{ github.ref_name }}-linux-amd64.AppImage` | ~52 MB | AppImage（推荐）|
            | Linux (x64) | `ltools-${{ github.ref_name }}-linux-amd64.deb` | ~52 MB | Debian/Ubuntu |
            | Linux (x64) | `ltools-${{ github.ref_name }}-linux-amd64.rpm` | ~52 MB | RHEL/CentOS/Fedora |

            ### 新功能

            - ✨ 自动更新机制（启动 10 秒后自动检查）
            - 🎵 音乐播放器（已包含音源服务）
            - 📋 剪贴板管理
            - 🔍 全局搜索

            ### 自动更新

            此版本已配置自动更新机制：
            - 应用启动 10 秒后自动检查更新
            - 发现新版本时显示更新通知
            - 支持手动检查（点击右下角刷新按钮或设置 → 关于）

            **更新方式**：
            - **Windows**: 下载新版本安装程序 → 静默安装 → 重启应用
            - **macOS**: 下载 .app bundle → 替换 /Applications/LTools.app → 重启应用
            - **Linux**: 下载 AppImage → 替换旧版本 → 重启应用

            更新清单：[update.json](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/update.json)

            ### 安装说明

            #### macOS
            ```bash
            # 1. 确保已安装 Node.js >= 16.0.0
            node --version

            # 2. 解压并安装应用
            # ARM64 (Apple Silicon - M1/M2/M3):
            tar xzf ltools-${{ github.ref_name }}-darwin-arm64.tar.gz
            # 或 AMD64 (Intel Mac):
            # tar xzf ltools-${{ github.ref_name }}-darwin-amd64.tar.gz

            mv LTools.app /Applications/

            # 3. 启动应用
            open /Applications/LTools.app
            ```

            #### Windows
            ```powershell
            # 1. 确保已安装 Node.js >= 16.0.0
            node --version

            # 2. 下载并运行安装程序
            # 双击 ltools-${{ github.ref_name }}-windows-amd64-installer.exe
            # 安装程序会自动包含音乐服务依赖

            # 3. 从开始菜单或桌面快捷方式启动
            ```

            #### Linux
            ```bash
            # 1. 确保已安装 Node.js >= 16.0.0
            node --version

            # 方式 A: AppImage (推荐)
            chmod +x ltools-${{ github.ref_name }}-linux-amd64.AppImage
            ./ltools-${{ github.ref_name }}-linux-amd64.AppImage

            # 方式 B: DEB 包 (Debian/Ubuntu)
            sudo dpkg -i ltools-${{ github.ref_name }}-linux-amd64.deb
            ltools

            # 方式 C: RPM 包 (RHEL/CentOS/Fedora)
            sudo rpm -i ltools-${{ github.ref_name }}-linux-amd64.rpm
            ltools
            ```

            ### 包含的组件

            - **LTools 主程序**
            - **音乐播放器音源服务**（已内置）
              - Node.js 依赖已预装
              - 支持多音源
              - 自动代理

            ### 故障排查

            **音乐播放器无法使用？**
            ```bash
            # 检查 Node.js 版本
            node --version  # 应该 >= v16.0.0

            # macOS: 音乐服务位于应用包内
            ls -la /Applications/LTools.app/Contents/Resources/lx-music-service/

            # Windows: 音乐服务位于安装目录
            ls "C:\Program Files\My Company\LTools\lx-music-service\"

            # Linux: 音乐服务位于
            ls /usr/local/share/ltools/lx-music-service/  # DEB/RPM
            # 或 AppImage 内部（自动处理）
            ```

            **应用无法启动？**
            - macOS: `chmod +x /Applications/LTools.app/Contents/MacOS/LTools`
            - Linux: `chmod +x ltools`
            - Windows: 检查防病毒软件

            ---

            **完整更新日志**: 查看 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest manifest
        run: |
          # 将 update.json 复制到仓库根目录，作为 latest 版本
          cp release/update.json update.json

          # 配置 git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 提交并推送到 main 分支
          git add update.json
          git commit -m "chore: update manifest for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
