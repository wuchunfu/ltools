name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            ext: ''
            archive: tar.gz
          - os: macos-latest
            goos: darwin
            ext: '.app'
            archive: tar.gz
          - os: windows-latest
            goos: windows
            ext: '.exe'
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'lx-music-service/package-lock.json'

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            build-essential
        continue-on-error: true

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Cache Wails CLI
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails3
          key: ${{ runner.os }}-wails3-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-wails3-

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Install music service dependencies
        run: |
          cd lx-music-service
          npm install --production
          npm prune --production

      - name: Package application
        run: wails3 package -v

      - name: Prepare release (macOS)
        if: matrix.goos == 'darwin'
        run: |
          # wails3 package creates bin/LTools.app with lx-music-service included
          tar czf ltools-${{ github.ref_name }}-${{ matrix.goos }}-arm64.tar.gz -C bin LTools.app

      - name: Prepare release (Windows)
        if: matrix.goos == 'windows'
        run: |
          # wails3 package creates NSIS installer in bin/
          # The installer already includes lx-music-service
          Move-Item -Path "bin\ltools-amd64-installer.exe" -Destination "ltools-${{ github.ref_name }}-${{ matrix.goos }}-amd64-installer.exe"

      - name: Prepare release (Linux)
        if: matrix.goos == 'linux'
        run: |
          # wails3 package creates AppImage, DEB, RPM in bin/
          # Copy them to release directory with proper naming
          mkdir -p release
          if [ -f bin/ltools-amd64.AppImage ]; then
            cp bin/ltools-amd64.AppImage ltools-${{ github.ref_name }}-${{ matrix.goos }}-amd64.AppImage
          fi
          if [ -f bin/ltools_*_amd64.deb ]; then
            cp bin/ltools_*_amd64.deb ltools-${{ github.ref_name }}-${{ matrix.goos }}-amd64.deb
          fi
          if [ -f bin/ltools-*.x86_64.rpm ]; then
            cp bin/ltools-*.x86_64.rpm ltools-${{ github.ref_name }}-${{ matrix.goos }}-amd64.rpm
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.goos }}
          path: |
            *.tar.gz
            *.zip
            *.exe
            *.AppImage
            *.deb
            *.rpm

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "update.json" \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate update manifest
        run: |
          chmod +x ./scripts/generate-update-manifest.sh
          ./scripts/generate-update-manifest.sh \
            ${{ github.ref_name }} \
            ./release \
            https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body: |
            ## 🎉 LTools ${{ github.ref_name }} 发布

            ### 系统要求

            **⚠️ 重要：音乐播放器功能需要 Node.js >= 16.0.0**

            - 下载地址：https://nodejs.org/
            - 推荐版本：LTS (Long Term Support)

            ### 下载地址

            | 平台 | 文件 | 大小 |
            |------|------|------|
            | macOS (ARM64) | `ltools-${{ github.ref_name }}-darwin-arm64.tar.gz` | ~50 MB |
            | Windows (x64) | `ltools-${{ github.ref_name }}-windows-amd64-installer.exe` | ~55 MB |
            | Linux (x64) | `ltools-${{ github.ref_name }}-linux-amd64.AppImage` | ~52 MB |
            | Linux (x64) | `ltools-${{ github.ref_name }}-linux-amd64.deb` | ~52 MB |
            | Linux (x64) | `ltools-${{ github.ref_name }}-linux-amd64.rpm` | ~52 MB |

            ### 新功能

            - ✨ 自动更新机制（启动 10 秒后自动检查）
            - 🎵 音乐播放器（已包含音源服务）
            - 📋 剪贴板管理
            - 🔍 全局搜索

            ### 自动更新

            此版本已配置自动更新：
            - 应用启动 10 秒后自动检查更新
            - 发现新版本时显示友好通知
            - 支持手动检查（点击右下角刷新按钮）

            更新清单：[update.json](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/update.json)

            ### 安装说明

            #### macOS
            ```bash
            # 1. 确保已安装 Node.js >= 16.0.0
            node --version

            # 2. 解压并安装应用
            tar xzf ltools-${{ github.ref_name }}-darwin-arm64.tar.gz
            mv LTools.app /Applications/

            # 3. 启动应用
            open /Applications/LTools.app
            ```

            #### Windows
            ```powershell
            # 1. 确保已安装 Node.js >= 16.0.0
            node --version

            # 2. 下载并运行安装程序
            # 双击 ltools-${{ github.ref_name }}-windows-amd64-installer.exe
            # 安装程序会自动包含音乐服务依赖

            # 3. 从开始菜单或桌面快捷方式启动
            ```

            #### Linux
            ```bash
            # 1. 确保已安装 Node.js >= 16.0.0
            node --version

            # 方式 A: AppImage (推荐，无需安装)
            chmod +x ltools-${{ github.ref_name }}-linux-amd64.AppImage
            ./ltools-${{ github.ref_name }}-linux-amd64.AppImage

            # 方式 B: DEB 包 (Debian/Ubuntu)
            sudo dpkg -i ltools-${{ github.ref_name }}-linux-amd64.deb
            ltools

            # 方式 C: RPM 包 (RHEL/CentOS/Fedora)
            sudo rpm -i ltools-${{ github.ref_name }}-linux-amd64.rpm
            ltools
            ```

            ### 包含的组件

            - **LTools 主程序**
            - **音乐播放器音源服务**（已内置）
              - Node.js 依赖已预装
              - 支持多音源
              - 自动代理

            ### 故障排查

            **音乐播放器无法使用？**
            ```bash
            # 检查 Node.js 版本
            node --version  # 应该 >= v16.0.0

            # macOS: 音乐服务位于应用包内
            ls -la /Applications/LTools.app/Contents/Resources/lx-music-service/

            # Windows: 音乐服务位于安装目录
            ls "C:\Program Files\My Company\LTools\lx-music-service\"

            # Linux: 音乐服务位于
            ls /usr/local/share/ltools/lx-music-service/  # DEB/RPM
            # 或 AppImage 内部（自动处理）
            ```

            **应用无法启动？**
            - macOS: `chmod +x /Applications/LTools.app/Contents/MacOS/LTools`
            - Linux: `chmod +x ltools`
            - Windows: 检查防病毒软件

            ---

            **完整更新日志**: 查看 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest manifest
        run: |
          # 将 update.json 复制到仓库根目录，作为 latest 版本
          cp release/update.json update.json

          # 配置 git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 提交并推送到 main 分支
          git add update.json
          git commit -m "chore: update manifest for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
