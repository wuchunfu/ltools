name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            arch: amd64
            ext: ''
            archive: tar.gz
          - os: macos-latest
            goos: darwin
            arch: arm64
            ext: '.app'
            archive: tar.gz
          # - os: macos-13
          #   goos: darwin
          #   arch: amd64
          #   ext: '.app'
          #   archive: tar.gz
          - os: windows-latest
            goos: windows
            arch: amd64
            ext: '.exe'
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache MinGW-w64 and NSIS (Windows)
        if: matrix.goos == 'windows'
        id: cache-windows-deps
        uses: actions/cache@v4
        with:
          path: |
            C:\ProgramData\chocolatey\lib\mingw
            C:\Program Files (x86)\NSIS
            C:\ProgramData\chocolatey\bin\gcc.exe
            C:\ProgramData\chocolatey\bin\g++.exe
            C:\ProgramData\chocolatey\bin\make.exe
          key: ${{ runner.os }}-mingw-nsis-v3
          restore-keys: |
            ${{ runner.os }}-mingw-nsis-

      - name: Install Windows dependencies
        if: matrix.goos == 'windows' && steps.cache-windows-deps.outputs.cache-hit != 'true'
        run: |
          choco install mingw nsis -y

          # 1. 将 NSIS 真实路径添加到 GITHUB_PATH（供后续步骤使用，无 BOM）
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"

          # 2. 为当前步骤安全地追加 NSIS 路径（不覆盖原有 PATH）
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if ($env:Path -notlike "*$nsisPath*") {
              $env:Path += ";$nsisPath"
          }

          # 3. 验证安装
          gcc --version
          makensis -version
        shell: powershell

      - name: Verify Windows dependencies from cache
        if: matrix.goos == 'windows' && steps.cache-windows-deps.outputs.cache-hit == 'true'
        run: |
          echo "Using MinGW-w64 and NSIS from cache"

          # 1. 将 NSIS 真实路径添加到 GITHUB_PATH（供后续步骤使用，无 BOM）
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"

          # 2. 为当前步骤安全地追加 NSIS 路径（不覆盖原有 PATH）
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if ($env:Path -notlike "*$nsisPath*") {
              $env:Path += ";$nsisPath"
          }

          # 3. 验证安装
          gcc --version
          makensis -version
        shell: powershell

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'lx-music-service/package-lock.json'

      - name: Cache Linux apt packages
        if: matrix.goos == 'linux'
        id: cache-linux-apt
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxcb1-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config \
            build-essential

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails3
          key: ${{ runner.os }}-wails3-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-wails3-

      - name: Install Wails CLI
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Add Wails to PATH (from cache)
        if: steps.cache-wails.outputs.cache-hit == 'true'
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install Task
        run: |
          curl -sL https://taskfile.dev/install.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Install music service dependencies
        run: |
          cd lx-music-service
          npm install --production
          npm prune --production

      - name: Build music service bundle
        run: |
          cd lx-music-service
          # 安装 devDependencies（包括 esbuild）用于构建
          npm install
          # 运行构建脚本生成 dist/server.bundle.js 和 dist/sources/
          npm run build
          # 复制构建产物到 plugins 目录（供 Go embed 使用）
          mkdir -p ../plugins/musicplayer/lx-music-service
          cp -r dist ../plugins/musicplayer/lx-music-service/
          echo "✓ Music service bundle built and copied to plugins directory"

      - name: Build and package application
        run: wails3 package

      - name: Cache Homebrew create-dmg (macOS)
        if: matrix.goos == 'darwin'
        id: cache-create-dmg
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/create-dmg--*
            /opt/homebrew/Cellar/create-dmg
          key: ${{ runner.os }}-create-dmg-v1
          restore-keys: |
            ${{ runner.os }}-create-dmg-

      - name: Install create-dmg (macOS)
        if: matrix.goos == 'darwin'
        run: |
          # 如果已缓存，尝试重新链接；否则安装
          if [ -d "/opt/homebrew/Cellar/create-dmg" ]; then
            echo "Restoring create-dmg from cache..."
            brew link create-dmg 2>/dev/null || brew install create-dmg
          else
            echo "Installing create-dmg..."
            brew install create-dmg
          fi
          # 验证安装
          create-dmg --version || echo "create-dmg ready"

      - name: Prepare release (macOS)
        if: matrix.goos == 'darwin'
        run: |
          ARCH="${{ matrix.arch }}"
          if [ -z "$ARCH" ]; then
            ARCH="$(uname -m)"
          fi

          # 创建 DMG 安装包
          if command -v create-dmg &> /dev/null; then
            echo "Creating DMG installer..."
            if [ -d "build/darwin/dmg" ]; then
              create-dmg \
                --volname "LTools Installer" \
                --window-pos 200 120 \
                --window-size 800 400 \
                --icon-size 100 \
                --icon "LTools.app" 200 185 \
                --app-drop-link 600 185 \
                --background build/darwin/dmg/background.png \
                "ltools-${{ github.ref_name }}-${{ matrix.goos }}-${ARCH}.dmg" \
                "bin/LTools.app"
            else
              create-dmg \
                --volname "LTools Installer" \
                --window-pos 200 120 \
                --window-size 800 400 \
                --icon-size 100 \
                --icon "LTools.app" 200 185 \
                --app-drop-link 600 185 \
                "ltools-${{ github.ref_name }}-${{ matrix.goos }}-${ARCH}.dmg" \
                "bin/LTools.app"
            fi
            echo "✓ DMG created successfully"
          else
            echo "⚠ create-dmg not available, falling back to tar.gz"
            tar czf ltools-${{ github.ref_name }}-${{ matrix.goos }}-${ARCH}.tar.gz -C bin LTools.app
          fi

      - name: Prepare release (Windows)
        if: matrix.goos == 'windows'
        run: |
          # Windows: NSIS 安装程序（用于更新和首次安装）
          Move-Item -Path "bin\ltools-amd64-installer.exe" -Destination "ltools-${{ github.ref_name }}-${{ matrix.goos }}-amd64-installer.exe"

      - name: Prepare release (Linux)
        if: matrix.goos == 'linux'
        run: |
          # 确定架构
          ARCH="${{ matrix.arch }}"
          if [ -z "$ARCH" ]; then
            ARCH="amd64"
          fi

          # 调试：查看 bin 目录内容
          echo "=== Listing bin directory contents ==="
          ls -lah bin/ || echo "bin directory not found or empty"

          # Linux: AppImage (用于更新和首次安装)
          # 注意：实际生成的文件名是 ltools-x86_64.AppImage (带连字符)
          if [ -f bin/ltools-x86_64.AppImage ]; then
            cp bin/ltools-x86_64.AppImage ltools-${{ github.ref_name }}-${{ matrix.goos }}-${ARCH}.AppImage
            echo "✓ AppImage copied successfully"
          else
            echo "⚠ AppImage not found at bin/ltools-x86_64.AppImage"
          fi

          # DEB/RPM (可选，供手动下载)
          # 注意：实际生成的文件名是 ltools.deb 和 ltools.rpm
          if [ -f bin/ltools.deb ]; then
            cp bin/ltools.deb ltools-${{ github.ref_name }}-${{ matrix.goos }}-${ARCH}.deb
            echo "✓ DEB package copied successfully"
          else
            echo "⚠ DEB package not found at bin/ltools.deb"
          fi

          if [ -f bin/ltools.rpm ]; then
            cp bin/ltools.rpm ltools-${{ github.ref_name }}-${{ matrix.goos }}-${ARCH}.rpm
            echo "✓ RPM package copied successfully"
          else
            echo "⚠ RPM package not found at bin/ltools.rpm"
          fi

          # 调试：查看当前目录生成的文件
          echo "=== Listing generated release files ==="
          ls -lh *.AppImage *.deb *.rpm 2>/dev/null || echo "No Linux packages found in current directory"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.goos }}
          path: |
            *.tar.gz
            *.zip
            *.exe
            *.AppImage
            *.deb
            *.rpm
            *.dmg

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.dmg" -o -name "update.json" \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate update manifest
        run: |
          chmod +x ./scripts/generate-update-manifest.sh
          ./scripts/generate-update-manifest.sh \
            ${{ github.ref_name }} \
            ./release \
            https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}

      - name: Read release notes
        id: release_notes
        run: |
          # 读取 RELEASE.md 并替换占位符
          RELEASE_BODY=$(cat RELEASE.md | \
            sed "s|{{VERSION}}|${{ github.ref_name }}|g" | \
            sed "s|{{REPO}}|${{ github.repository }}|g")
          # 保存到文件（避免多行字符串问题）
          echo "$RELEASE_BODY" > /tmp/release_body.md
          echo "release_body_file=/tmp/release_body.md" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: ${{ steps.release_notes.outputs.release_body_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest manifest
        run: |
          # 配置 git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 切换到 main 分支
          git fetch origin main
          git checkout main

          # 将 update.json 复制到仓库根目录，作为 latest 版本
          cp release/update.json update.json

          # 提交并推送
          git add update.json
          git commit -m "chore: update manifest for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
